<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/img/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="shortcut icon" href="assets/img/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Ondra Hladík" />
  <link rel="manifest" href="assets/img/site.webmanifest" />

  <title>Contact</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/contact.css">
  <link rel="stylesheet" href="assets/css/shared.css">
</head>

<body class="text-slate-200 font-mono min-h-full flex flex-col">

  <!-- TOP BAR -->
  <header class="border-b border-slate-800 relative z-50 bg-[#020617]/80 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-4 text-sm">
        <span class="text-slate-300">Ondřej Hladík</span>
      </div>
      
      <nav class="hidden md:flex items-center gap-6">
        <a href="projects" class="text-sm text-slate-400">PROJECTS</a>
        <a href="contact" class="text-sm text-slate-400">CONTACT</a>
      </nav>
      
      <span class="hidden md:block text-xs text-slate-500">updated: 2026-03-26</span>

      <!-- Mobile Menu Button -->
      <button id="mobile-menu-btn" class="md:hidden text-slate-400 hover:text-white p-2">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden absolute top-16 left-0 w-full bg-slate-900/95 border-b border-slate-800 p-6 backdrop-blur-sm">
      <nav class="flex flex-col gap-4">
        <a href="projects" class="text-slate-400 block py-2">PROJECTS</a>
        <a href="contact" class="text-slate-400 block py-2">CONTACT</a>
      </nav>
      <div class="mt-4 pt-4 border-t border-slate-800 text-xs text-slate-500">
        updated: 2026-03-26
      </div>
    </div>
  </header>

  <script>
    document.getElementById('mobile-menu-btn').addEventListener('click', function() {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
    });

    (function(){
      const links = document.querySelectorAll('nav a');
      links.forEach(a => {
        try{
          const href = new URL(a.href).pathname.split('/').pop();
          const page = location.pathname.split('/').pop() || 'contact';
          if(href === page) a.classList.add('active');
        }catch(e){}
      });
    })();
  </script>

  <main class="flex-grow max-w-4xl mx-auto px-6 py-16 w-full">

    <div class="mb-12">
      <h1 class="text-4xl font-bold mb-3 title-gradient">Kontaktní informace</h1>
      <p class="text-slate-400 text-base">Neváhejte mě kontaktovat pro spolupráci nebo dotazy</p>
    </div>

    <div class="contact-card mb-12">
      
      <div class="contact-item">
        <div class="contact-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
        </div>
        <div>
          <div class="contact-label">Jméno</div>
          <div class="contact-value">Ondřej Hladík</div>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
          </svg>
        </div>
        <div>
          <div class="contact-label">Adresa</div>
          <div class="contact-value">Převýšov, 50351</div>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
          </svg>
        </div>
        <div>
          <div class="contact-label">E-mail</div>
          <div class="contact-value">
            <a href="mailto:ondra@ok1kky.cz">ondra@ok1kky.cz</a>
          </div>
        </div>
      </div>

    </div>

    <div>
      <h2 class="text-2xl font-bold mb-6 title-gradient">Sociální sítě</h2>
      <div class="flex flex-wrap gap-4">
        
        <a href="https://www.facebook.com/hladik.ondra" target="_blank" class="social-icon" title="Facebook">
          <i class="bi bi-facebook"></i>
        </a>

        <a href="https://twitter.com/OndraHladk" target="_blank" class="social-icon" title="Twitter">
          <i class="bi bi-twitter-x"></i>
        </a>

        <a href="http://www.youtube.com/@ondra-hladik" target="_blank" class="social-icon" title="YouTube">
          <i class="bi bi-youtube"></i>
        </a>

        <a href="https://www.instagram.com/johny_oh" target="_blank" class="social-icon" title="Instagram">
          <i class="bi bi-instagram"></i>
        </a>

        <a href="https://github.com/ondrahladik" target="_blank" class="social-icon" title="GitHub">
          <i class="bi bi-github"></i>
        </a>

      </div>
    </div>

  </main>

  <footer class="text-xs text-slate-500 px-6 py-8 border-t border-slate-800 text-center">
    <p>© 2026 Ondra Hladík</p>
  </footer>

</body>

</html>
